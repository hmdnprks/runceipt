name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov-report/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          STRAVA_CLIENT_ID: test
          STRAVA_CLIENT_SECRET: test
          AUTH_SECRET: ci-test-secret-that-is-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 14

  visual-tests:
    name: Visual Regression
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Generate missing Linux snapshots
        run: |
          if ls e2e/visual.spec.ts-snapshots/*-chromium-linux.png 1>/dev/null 2>&1; then
            echo "Linux snapshots already exist, skipping generation"
          else
            echo "No Linux snapshots found, generating baseline..."
            npm run test:visual -- --update-snapshots
          fi
        env:
          STRAVA_CLIENT_ID: test
          STRAVA_CLIENT_SECRET: test
          AUTH_SECRET: ci-test-secret-that-is-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
      - name: Commit new Linux snapshots if generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual.spec.ts-snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update visual snapshots for linux [skip ci]"
            git push
          fi
      - name: Run visual regression tests
        run: npm run test:visual
        env:
          STRAVA_CLIENT_ID: test
          STRAVA_CLIENT_SECRET: test
          AUTH_SECRET: ci-test-secret-that-is-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: visual-diff-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
